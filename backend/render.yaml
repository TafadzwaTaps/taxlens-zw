services:
  - type: web
    name: taxlens-zw-backend
    runtime: python
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false        # set a strong random string in Render dashboard
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.8"
