# render.yaml — Render.com deployment config for TaxLens Zimbabwe backend.
# Push to GitHub → connect repo in Render dashboard → it reads this file.

services:
  - type: web
    name: taxlens-zw-backend
    runtime: python
    rootDir: backend                     # Render runs commands from the backend/ folder
    region: oregon                       # oregon | frankfurt | singapore | ohio
    plan: free                           # free (spins down) | starter $7/mo (always-on)

    buildCommand: "bash build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: SUPABASE_URL
        sync: false                      # set manually in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false                      # mark as secret in Render dashboard
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.8"                  # explicit patch version — prevents Render
                                         # defaulting to latest (3.14 breaks Jinja2)
